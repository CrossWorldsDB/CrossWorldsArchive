<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>CrossWorlds Archive — Sonic Racing CrossWorlds Asset Database</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="index">

  <div id="wrapper">

    <div id="header">
      <h1><span>CrossWorlds</span> Archive</h1>
      <div class="tagline">Community asset database for Sonic Racing CrossWorlds &mdash; textures and audio</div>
    </div>

    <div id="navbar">
      <a href="index.html">Home</a><a href="contribute.html">Contribute</a><a href="https://github.com/CrossWorldsDB/CrossWorldsArchive" target="_blank">GitHub</a>
    </div>

    <div id="stats-bar">Loading...</div>

    <div id="filter-bar">

      <div class="filter-group">
        <label for="filter-search">Search</label>
        <input type="text" id="filter-search" placeholder="filename...">
      </div>

      <div class="filter-group">
        <label for="filter-type">Type</label>
        <select id="filter-type">
          <option value="">All types</option>
          <option value="texture">Texture</option>
          <option value="audio">Audio</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-patch">Patch</label>
        <select id="filter-patch">
          <option value="">All patches</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-subcat">Folder</label>
        <select id="filter-subcat">
          <option value="">All folders</option>
        </select>
      </div>

      <button id="btn-reset">Reset</button>

    </div>

    <div id="sort-bar">
      <span id="result-count"></span>
    </div>

    <div id="asset-grid">
      <div id="loading-msg">Loading assets...</div>
      <div id="no-results">No assets match your filters.</div>
    </div>

    <div id="footer">
      CrossWorlds Archive &mdash; fan-maintained, not affiliated with SEGA or Sonic Team &mdash;
      <a href="https://github.com/CrossWorldsDB/CrossWorldsArchive" target="_blank">GitHub</a>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
